AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: >
  Stock market ingestion pipeline using AWS Lambda, Amazon S3,
  AWS Secrets Manager, CloudWatch Logs, and least-privilege IAM.

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod
    Description: Deployment environment name.

  TwelveDataSecretArn:
    Type: String
    Description: >
      ARN of the Secrets Manager secret containing the Twelve Data API key.

  IngestionScheduleState:
    Type: String
    Default: DISABLED
    AllowedValues:
      - ENABLED
      - DISABLED
    Description: Enables or disables the stock ingestion schedules.

  AlertEmail:
    Type: String
    Description: Email address that receives pipeline alarm notifications.

Globals:
  Function:
    Runtime: python3.12
    Architectures:
      - x86_64
    MemorySize: 128
    Timeout: 30

Resources:
  StockDataBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

      LifecycleConfiguration:
        Rules:
          - Id: RawDataLifecycle
            Status: Enabled
            Prefix: raw/
            ExpirationInDays: 90
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

          - Id: StandardizedDataLifecycle
            Status: Enabled
            Prefix: standardized/
            ExpirationInDays: 365
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

          - Id: RejectedDataLifecycle
            Status: Enabled
            Prefix: rejected/
            ExpirationInDays: 90
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

          - Id: DeleteAthenaQueryResults
            Status: Enabled
            Prefix: athena-results/
            ExpirationInDays: 30

      Tags:
        - Key: Project
          Value: aws-stock-market-data-pipeline
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: AWS-SAM

  StockDataBucketPolicy:
    Type: AWS::S3::BucketPolicy

    Properties:
      Bucket: !Ref StockDataBucket

      PolicyDocument:
        Version: "2012-10-17"

        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"

            Resource:
              - !GetAtt StockDataBucket.Arn
              - !Sub "${StockDataBucket.Arn}/*"

            Condition:
              Bool:
                aws:SecureTransport: false

  StockIngestionFunction:
    Type: AWS::Serverless::Function

    Properties:
      FunctionName: !Sub "stock-pipeline-ingestion-${EnvironmentName}"

      Description: >
        Retrieves stock quotes, validates the records, and stores
        raw and standardized JSONL objects in Amazon S3.

      CodeUri: ../src

      Handler: stockpipeline.ingestion.lambda_function.lambda_handler

      Environment:
        Variables:
          STOCK_DATA_BUCKET: !Ref StockDataBucket
          TWELVE_DATA_SECRET_ARN: !Ref TwelveDataSecretArn
          LOG_LEVEL: INFO

      Events:
        MarketOpenSchedule:
          Type: ScheduleV2
          Properties:
            Name: !Sub "stock-pipeline-market-open-${EnvironmentName}"
            Description: >
              Runs every five minutes from 9:30 AM through
              9:55 AM Eastern Time on weekdays.
            ScheduleExpression: "cron(30/5 9 ? * MON-FRI *)"
            ScheduleExpressionTimezone: America/New_York
            State: !Ref IngestionScheduleState
            FlexibleTimeWindow:
              Mode: "OFF"
            RetryPolicy:
              MaximumRetryAttempts: 1
              MaximumEventAgeInSeconds: 300
            Input: >
              {"source":"aws.scheduler","detail-type":"Scheduled Event",
              "symbols":["AAPL","AMZN","JPM","WMT","XOM"]}

        MarketDaySchedule:
          Type: ScheduleV2
          Properties:
            Name: !Sub "stock-pipeline-market-day-${EnvironmentName}"
            Description: >
              Runs every five minutes from 10:00 AM through
              3:55 PM Eastern Time on weekdays.
            ScheduleExpression: "cron(0/5 10-15 ? * MON-FRI *)"
            ScheduleExpressionTimezone: America/New_York
            State: !Ref IngestionScheduleState
            FlexibleTimeWindow:
              Mode: "OFF"
            RetryPolicy:
              MaximumRetryAttempts: 1
              MaximumEventAgeInSeconds: 300
            Input: >
              {"source":"aws.scheduler","detail-type":"Scheduled Event",
              "symbols":["AAPL","AMZN","JPM","WMT","XOM"]}

        MarketCloseSchedule:
          Type: ScheduleV2
          Properties:
            Name: !Sub "stock-pipeline-market-close-${EnvironmentName}"
            Description: Runs once at 4:00 PM Eastern Time on weekdays.
            ScheduleExpression: "cron(0 16 ? * MON-FRI *)"
            ScheduleExpressionTimezone: America/New_York
            State: !Ref IngestionScheduleState
            FlexibleTimeWindow:
              Mode: "OFF"
            RetryPolicy:
              MaximumRetryAttempts: 1
              MaximumEventAgeInSeconds: 300
            Input: >
              {"source":"aws.scheduler","detail-type":"Scheduled Event",
              "symbols":["AAPL","AMZN","JPM","WMT","XOM"]}

      Policies:
        - Statement:
            - Sid: WriteStockDataObjects
              Effect: Allow
              Action:
                - s3:PutObject
              Resource:
                - !Sub "${StockDataBucket.Arn}/raw/*"
                - !Sub "${StockDataBucket.Arn}/standardized/*"

            - Sid: ReadTwelveDataSecret
              Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Ref TwelveDataSecretArn

      Tags:
        Project: aws-stock-market-data-pipeline
        Environment: !Ref EnvironmentName
        ManagedBy: AWS-SAM

  StockIngestionLogGroup:
    Type: AWS::Logs::LogGroup

    Properties:
      LogGroupName: !Sub "/aws/lambda/${StockIngestionFunction}"
      RetentionInDays: 14

  PipelineAlarmTopic:
    Type: AWS::SNS::Topic

    Properties:
      TopicName: !Sub "stock-pipeline-alarms-${EnvironmentName}"

      Tags:
        - Key: Project
          Value: aws-stock-market-data-pipeline
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: AWS-SAM

  PipelineAlarmEmailSubscription:
    Type: AWS::SNS::Subscription

    Properties:
      TopicArn: !Ref PipelineAlarmTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  StockIngestionErrorAlarm:
    Type: AWS::CloudWatch::Alarm

    Properties:
      AlarmName: !Sub "stock-pipeline-lambda-errors-${EnvironmentName}"

      AlarmDescription: >
        Alerts when the stock ingestion Lambda has one or more
        unhandled invocation errors within five minutes.

      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

      Dimensions:
        - Name: FunctionName
          Value: !Ref StockIngestionFunction

      AlarmActions:
        - !Ref PipelineAlarmTopic

      OKActions:
        - !Ref PipelineAlarmTopic

  StockIngestionThrottleAlarm:
    Type: AWS::CloudWatch::Alarm

    Properties:
      AlarmName: !Sub "stock-pipeline-lambda-throttles-${EnvironmentName}"

      AlarmDescription: >
        Alerts when the stock ingestion Lambda invocation is throttled.

      Namespace: AWS/Lambda
      MetricName: Throttles
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

      Dimensions:
        - Name: FunctionName
          Value: !Ref StockIngestionFunction

      AlarmActions:
        - !Ref PipelineAlarmTopic

      OKActions:
        - !Ref PipelineAlarmTopic

  StockIngestionDurationAlarm:
    Type: AWS::CloudWatch::Alarm

    Properties:
      AlarmName: !Sub "stock-pipeline-lambda-duration-${EnvironmentName}"

      AlarmDescription: >
        Alerts when the stock ingestion Lambda execution duration
        reaches 25 seconds, approaching its 30-second timeout.

      Namespace: AWS/Lambda
      MetricName: Duration
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 25000
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

      Dimensions:
        - Name: FunctionName
          Value: !Ref StockIngestionFunction

      AlarmActions:
        - !Ref PipelineAlarmTopic

      OKActions:
        - !Ref PipelineAlarmTopic

  GlueAssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-glue-assets-${AWS::AccountId}"

      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
        
      LifecycleConfiguration:
        Rules:
          - Id: DeleteTemporaryGlueAssets
            Status: Enabled
            Prefix: temporary/
            ExpirationInDays: 30
    
  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-glue-service-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - glue.amazonaws.com
            Action:
              - sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole

      Policies:
        - PolicyName: StockDataLakeAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ListStockDataBucket
                Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !GetAtt StockDataBucket.Arn

              - Sid: ReadStandardizedData
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub "${StockDataBucket.Arn}/standardized/*"

              - Sid: WriteCuratedData
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub "${StockDataBucket.Arn}/curated/*"

              - Sid: WriteRejectedData
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub "${StockDataBucket.Arn}/rejected/*"

              - Sid: AccessGlueAssets
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub "${GlueAssetsBucket.Arn}/*"

              - Sid: ListGlueAssetsBucket
                Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !GetAtt GlueAssetsBucket.Arn

  # ============================================================
  # AWS Glue Data Catalog
  # ============================================================

  StockDataCatalogDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Sub "${AWS::StackName}_stock_data"
        Description: Data Catalog database for standardized and curated stock data

  StandardizedDataCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: !Sub "${AWS::StackName}-standardized-crawler"
      Description: Crawls standardized stock quote JSONL data in Amazon S3
      Role: !GetAtt GlueServiceRole.Arn
      DatabaseName: !Ref StockDataCatalogDatabase

      Targets:
        S3Targets:
          - Path: !Sub "s3://${StockDataBucket}/standardized/quotes/"

      TablePrefix: standardized_

      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: LOG

      RecrawlPolicy:
        RecrawlBehavior: CRAWL_EVERYTHING

# ============================================================
# Glue ETL Job
# ============================================================

  StandardizedToCuratedJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Sub "${AWS::StackName}-standardized-to-curated"

      Description: >
        Converts standardized JSONL stock quotes
        into curated Parquet files.

      Role: !GetAtt GlueServiceRole.Arn

      Command:
        Name: glueetl
        ScriptLocation: !Sub
          - "s3://${AssetsBucket}/scripts/standardized_to_curated.py"
          - AssetsBucket: !Ref GlueAssetsBucket

      GlueVersion: "5.0"

      WorkerType: G.1X
      NumberOfWorkers: 2

      Timeout: 10
      MaxRetries: 0

      DefaultArguments:
        "--job-language": "python"
        "--enable-metrics": "true"
        "--enable-continuous-cloudwatch-log": "true"

        "--SOURCE_DATABASE": !Ref StockDataCatalogDatabase
        "--SOURCE_TABLE": "standardized_quotes"

        "--CURATED_OUTPUT_PATH": !Sub "s3://${StockDataBucket}/curated/quotes/"

        "--REJECTED_OUTPUT_PATH": !Sub "s3://${StockDataBucket}/rejected/quotes/"

  CuratedDataCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: !Sub "${AWS::StackName}-curated-crawler"

      Description: Crawls curated Parquet data

      Role: !GetAtt GlueServiceRole.Arn

      DatabaseName: !Ref StockDataCatalogDatabase

      Targets:
        S3Targets:
          - Path: !Sub "s3://${StockDataBucket}/curated/quotes/"

      TablePrefix: curated_

      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: LOG

      RecrawlPolicy:
        RecrawlBehavior: CRAWL_EVERYTHING

  # ============================================================
  # Amazon Athena
  # ============================================================

  StockAnalyticsWorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: !Sub "${AWS::StackName}-analytics"
      Description: Athena workgroup for querying stock pipeline data
      State: ENABLED

      WorkGroupConfiguration:
        EnforceWorkGroupConfiguration: true
        PublishCloudWatchMetricsEnabled: true

        ResultConfiguration:
          OutputLocation: !Sub "s3://${StockDataBucket}/athena-results/"

          EncryptionConfiguration:
            EncryptionOption: SSE_S3

Outputs:
  StockDataBucketName:
    Description: Name of the stock-market data bucket.
    Value: !Ref StockDataBucket

  StockDataBucketArn:
    Description: ARN of the stock-market data bucket.
    Value: !GetAtt StockDataBucket.Arn

  StockIngestionFunctionName:
    Description: Name of the stock ingestion Lambda function.
    Value: !Ref StockIngestionFunction

  StockIngestionFunctionArn:
    Description: ARN of the stock ingestion Lambda function.
    Value: !GetAtt StockIngestionFunction.Arn

  PipelineAlarmTopicArn:
    Description: ARN of the SNS topic used for pipeline alarm notifications.
    Value: !Ref PipelineAlarmTopic

  StockIngestionErrorAlarmName:
    Description: Name of the Lambda error alarm.
    Value: !Ref StockIngestionErrorAlarm

  StockIngestionThrottleAlarmName:
    Description: Name of the Lambda throttle alarm.
    Value: !Ref StockIngestionThrottleAlarm

  StockIngestionDurationAlarmName:
    Description: Name of the Lambda duration alarm.
    Value: !Ref StockIngestionDurationAlarm

  GlueServiceRoleArn:
    Description: IAM role used by AWS Glue crawlers and ETL jobs
    Value: !GetAtt GlueServiceRole.Arn

  GlueAssetsBucketName:
    Description: S3 bucket for AWS Glue scripts and temporary assets
    Value: !Ref GlueAssetsBucket

  StockDataCatalogDatabaseName:
    Description: AWS Glue Data Catalog database for the stock pipeline
    Value: !Ref StockDataCatalogDatabase

  StandardizedDataCrawlerName:
    Description: AWS Glue crawler for standardized stock quote data
    Value: !Ref StandardizedDataCrawler

  StockAnalyticsWorkGroupName:
    Description: Athena workgroup for stock pipeline analytics
    Value: !Ref StockAnalyticsWorkGroup

  StandardizedToCuratedJobName:
    Description: Glue ETL Job
    Value: !Ref StandardizedToCuratedJob

  CuratedDataCrawlerName:
    Description: Curated Glue Crawler
    Value: !Ref CuratedDataCrawler